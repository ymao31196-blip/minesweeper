<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷 — Minesweeper</title>
<style>
:root {
  --bg: #e0e0e0;
  --panel: #c0c0c0;
  --border-light: #ffffff;
  --border-dark: #808080;
  --cell-size: 32px;
  --cell-bg: #c0c0c0;
  --cell-revealed: #d0d0d0;
  --font-mono: 'Courier New', Courier, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 16px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  max-width: 100%;
}

/* ── Title ── */
h1 {
  font-size: 1.6rem;
  letter-spacing: 2px;
  color: #444;
  margin-bottom: 4px;
}

/* ── Difficulty selector ── */
.difficulty-bar {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
.difficulty-bar button {
  padding: 6px 18px;
  border: 2px solid #999;
  border-radius: 4px;
  background: #ddd;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit;
}
.difficulty-bar button:hover { background: #ccc; }
.difficulty-bar button.active {
  background: #4a90d9;
  color: #fff;
  border-color: #357abd;
}

/* ── Game panel ── */
.game-panel {
  background: var(--panel);
  border: 3px solid;
  border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
}

/* ── Info bar ── */
.info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px solid;
  border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
  padding: 4px 8px;
  background: #000;
  font-family: var(--font-mono);
}
.counter {
  background: #200000;
  color: #ff0000;
  font-size: 1.5rem;
  font-weight: bold;
  padding: 2px 8px;
  min-width: 58px;
  text-align: center;
  letter-spacing: 2px;
  border: 1px inset #888;
}
.reset-btn {
  width: 44px;
  height: 44px;
  font-size: 1.5rem;
  line-height: 1;
  border: 2px solid;
  border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
  background: var(--cell-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s;
}
.reset-btn:active {
  border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
  transform: scale(0.95);
}
.reset-btn.win  { background: #ffe0a0; }
.reset-btn.lose { background: #ffc0c0; }

/* ── Board ── */
.board-wrapper {
  border: 3px solid;
  border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
}
.board {
  display: grid;
  gap: 1px;
  background: #999;
  grid-template-columns: repeat(var(--cols), var(--cell-size));
}

/* ── Cell ── */
.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--cell-bg);
  border: 2px solid;
  border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
  font-family: var(--font-mono);
  transition: background 0.05s, border 0.05s;
}
.cell:hover:not(.revealed) {
  background: #d0d0d0;
}
.cell:active:not(.revealed):not(.flagged):not(.question-mark) {
  border: 1px solid #999;
}

.cell.revealed {
  background: var(--cell-revealed);
  border: 1px solid #b0b0b0;
  cursor: default;
}
.cell.revealed.mine {
  background: #ff6060;
}
.cell.revealed.mine-detonated {
  background: #ff0000;
}
.cell.flagged {
  cursor: pointer;
}
.cell.question-mark {
  cursor: pointer;
}

/* Number colors */
.cell.num-1 { color: #0000FF; }
.cell.num-2 { color: #008000; }
.cell.num-3 { color: #FF0000; }
.cell.num-4 { color: #000080; }
.cell.num-5 { color: #800000; }
.cell.num-6 { color: #008080; }
.cell.num-7 { color: #000000; }
.cell.num-8 { color: #808080; }

/* ── High scores ── */
.high-scores {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 0.85rem;
  color: #555;
}
.high-scores .hs-entry {
  background: #eee;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 12px;
  text-align: center;
  min-width: 80px;
}
.high-scores .hs-label {
  font-weight: bold;
  margin-bottom: 2px;
}
.high-scores .hs-time {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: #222;
}
.high-scores .hs-none {
  color: #aaa;
  font-style: italic;
}

/* ── Mobile flag toggle ── */
.mobile-toggle {
  display: none;
  gap: 8px;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}
.mobile-toggle button {
  padding: 6px 14px;
  border-radius: 4px;
  border: 2px solid #999;
  background: #ddd;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
}
.mobile-toggle button.flag-mode {
  background: #ff9800;
  color: #fff;
  border-color: #e68900;
}
.mobile-toggle button.reveal-mode {
  background: #4a90d9;
  color: #fff;
  border-color: #357abd;
}

@media (pointer: coarse) {
  .mobile-toggle { display: flex; }
}

/* ── Responsive cell sizing ── */
@media (max-width: 500px) {
  :root { --cell-size: 28px; }
}
@media (max-width: 380px) {
  :root { --cell-size: 24px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>💣 扫 雷 💣</h1>

  <div class="difficulty-bar">
    <button data-diff="beginner" class="active">初级 9×9</button>
    <button data-diff="intermediate">中级 16×16</button>
    <button data-diff="expert">高级 30×16</button>
  </div>

  <div class="game-panel">
    <div class="info-bar">
      <div class="counter" id="mineCounter">010</div>
      <button class="reset-btn" id="resetBtn" title="重新开始">😊</button>
      <div class="counter" id="timer">000</div>
    </div>
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="mobile-toggle" id="mobileToggle">
    <span>模式：</span>
    <button id="mobileRevealBtn">🔍 翻开</button>
    <button id="mobileFlagBtn">🚩 标记</button>
  </div>

  <div class="high-scores" id="highScores"></div>
</div>

<script>
(function() {
'use strict';

/* ================================================================
   Constants
   ================================================================ */

const DIFFICULTIES = {
  beginner:     { rows: 9,  cols: 9,  mines: 10, label: '初级' },
  intermediate: { rows: 16, cols: 16, mines: 40, label: '中级' },
  expert:       { rows: 16, cols: 30, mines: 99, label: '高级' }
};

const SMILEY = { normal: '😊', pressed: '😮', win: '😎', lose: '💀' };

/* ================================================================
   Sound Manager — Web Audio API procedural sounds
   ================================================================ */

class SoundManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (_) { this.enabled = false; }
  }

  _ensure() {
    if (!this.enabled || !this.ctx) return null;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  }

  _tone(freq, duration, type, vol, rampDown) {
    const ctx = this._ensure();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + (rampDown || duration));
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.01);
  }

  _noise(duration, vol) {
    const ctx = this._ensure();
    if (!ctx) return;
    const now = ctx.currentTime;
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start(now);
    src.stop(now + duration + 0.01);
  }

  click()     { this._tone(800, 0.04, 'square', 0.08, 0.03); }
  flag()      { this._tone(500, 0.05, 'triangle', 0.1, 0.04); }
  reveal0()   { this._tone(400, 0.06, 'sine', 0.06, 0.05); }
  explosion() { this._noise(0.35, 0.25); this._tone(60, 0.35, 'sawtooth', 0.15, 0.3); }
  win() {
    const ctx = this._ensure();
    if (!ctx) return;
    const now = ctx.currentTime;
    [523, 659, 784].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      const t = now + i * 0.12;
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.25);
    });
  }
}

/* ================================================================
   High Score Manager
   ================================================================ */

class HighScoreManager {
  constructor() {
    this.storageKey = 'minesweeper_highscores';
    this.scores = this._load();
  }

  _load() {
    try {
      const raw = localStorage.getItem(this.storageKey);
      return raw ? JSON.parse(raw) : {};
    } catch (_) { return {}; }
  }

  _save() {
    try { localStorage.setItem(this.storageKey, JSON.stringify(this.scores)); } catch (_) {}
  }

  get(difficulty) { return this.scores[difficulty] || null; }

  set(difficulty, time) {
    const prev = this.scores[difficulty];
    if (prev == null || time < prev) {
      this.scores[difficulty] = time;
      this._save();
      return true;
    }
    return false;
  }
}

/* ================================================================
   Minesweeper Game
   ================================================================ */

class Minesweeper {
  constructor(soundMgr, scoreMgr) {
    this.sound = soundMgr;
    this.scores = scoreMgr;
    this.difficulty = 'beginner';
    this.rows = 9;
    this.cols = 9;
    this.totalMines = 10;
    this.board = [];
    this.cellEls = [];
    this.state = 'waiting';   // waiting | playing | won | lost
    this.timer = 0;
    this.timerInterval = null;
    this.flagCount = 0;
    this.revealedCount = 0;
    this.firstClickDone = false;

    // DOM handles
    this.boardEl = document.getElementById('board');
    this.mineCounterEl = document.getElementById('mineCounter');
    this.timerEl = document.getElementById('timer');
    this.resetBtn = document.getElementById('resetBtn');

    this._bindUI();
    this._buildBoard();
    this._updateMineCounter();
    this._renderHighScores();
  }

  /* ---- UI bindings ---- */
  _bindUI() {
    this.boardEl.addEventListener('click', e => this._onClick(e));
    this.boardEl.addEventListener('dblclick', e => this._onDblClick(e));
    this.boardEl.addEventListener('contextmenu', e => {
      e.preventDefault();
      const cell = this._getCellFromEvent(e);
      if (cell) this.toggleFlag(cell.row, cell.col);
    });
    this.boardEl.addEventListener('mousedown', e => this._onMouseDown(e));
    this.boardEl.addEventListener('mouseup', e => this._onMouseUp(e));
    this.boardEl.addEventListener('mouseleave', () => this._onMouseUp(null));
    this.resetBtn.addEventListener('click', () => this.reset());
    this.resetBtn.addEventListener('mousedown', () => this._setSmiley('pressed'));
    this.resetBtn.addEventListener('mouseup', () => this._setSmiley());
    this.resetBtn.addEventListener('mouseleave', () => this._setSmiley());

    // Difficulty buttons
    document.querySelectorAll('.difficulty-bar button').forEach(btn => {
      btn.addEventListener('click', () => this.setDifficulty(btn.dataset.diff));
    });

    // Mobile toggle
    this.mobileFlagMode = false;
    const mobileReveal = document.getElementById('mobileRevealBtn');
    const mobileFlag = document.getElementById('mobileFlagBtn');
    if (mobileReveal && mobileFlag) {
      mobileReveal.classList.add('reveal-mode');
      mobileReveal.addEventListener('click', () => {
        this.mobileFlagMode = false;
        mobileReveal.classList.add('reveal-mode');
        mobileFlag.classList.remove('flag-mode');
      });
      mobileFlag.addEventListener('click', () => {
        this.mobileFlagMode = true;
        mobileFlag.classList.add('flag-mode');
        mobileReveal.classList.remove('reveal-mode');
      });
    }

    // Touch long-press for flag (mobile)
    this._longPressTimer = null;
    this._longPressCell = null;
    this.boardEl.addEventListener('touchstart', e => this._onTouchStart(e), { passive: false });
    this.boardEl.addEventListener('touchend', e => this._onTouchEnd(e));
    this.boardEl.addEventListener('touchmove', () => this._cancelLongPress());
  }

  /* ---- Difficulty ---- */
  setDifficulty(diff) {
    if (!DIFFICULTIES[diff]) return;
    this.difficulty = diff;
    const cfg = DIFFICULTIES[diff];
    this.rows = cfg.rows;
    this.cols = cfg.cols;
    this.totalMines = cfg.mines;

    document.querySelectorAll('.difficulty-bar button').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-diff="${diff}"]`).classList.add('active');

    this._stopTimer();
    this._buildBoard();
    this.state = 'waiting';
    this.timer = 0;
    this.flagCount = 0;
    this.revealedCount = 0;
    this.firstClickDone = false;
    this._updateMineCounter();
    this._updateTimer();
    this._setSmiley('normal');
  }

  /* ---- Board construction ---- */
  _buildBoard() {
    this.boardEl.innerHTML = '';
    this.boardEl.style.setProperty('--cols', this.cols);
    const maxBoardWidth = Math.min(window.innerWidth * 0.9, 700);
    let cellSize = Math.floor(maxBoardWidth / this.cols);
    cellSize = Math.max(22, Math.min(40, cellSize));
    this.boardEl.style.setProperty('--cell-size', cellSize + 'px');
    this.board = [];
    this.cellEls = [];

    for (let r = 0; r < this.rows; r++) {
      this.board[r] = [];
      this.cellEls[r] = [];
      for (let c = 0; c < this.cols; c++) {
        this.board[r][c] = {
          mine: false,
          revealed: false,
          flagged: false,
          questionMark: false,
          adjacentMines: 0
        };
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.row = r;
        el.dataset.col = c;
        this.boardEl.appendChild(el);
        this.cellEls[r][c] = el;
      }
    }
  }

  /* ---- Reset ---- */
  reset() {
    this._stopTimer();
    this.state = 'waiting';
    this.timer = 0;
    this.flagCount = 0;
    this.revealedCount = 0;
    this.firstClickDone = false;

    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        const cell = this.board[r][c];
        cell.mine = false;
        cell.revealed = false;
        cell.flagged = false;
        cell.questionMark = false;
        cell.adjacentMines = 0;
        this._renderCell(r, c);
      }
    }

    this._updateMineCounter();
    this._updateTimer();
    this._setSmiley('normal');
  }

  /* ---- Mine generation (after first click) ---- */
  _generateMines(safeRow, safeCol) {
    const safeSet = new Set();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = safeRow + dr, nc = safeCol + dc;
        if (nr >= 0 && nr < this.rows && nc >= 0 && nc < this.cols) {
          safeSet.add(nr * this.cols + nc);
        }
      }
    }

    const candidates = [];
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (!safeSet.has(r * this.cols + c)) {
          candidates.push(r * this.cols + c);
        }
      }
    }

    const n = Math.min(this.totalMines, candidates.length);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }

    for (let i = 0; i < n; i++) {
      const idx = candidates[i];
      const r = Math.floor(idx / this.cols);
      const c = idx % this.cols;
      this.board[r][c].mine = true;
    }

    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (this.board[r][c].mine) continue;
        this.board[r][c].adjacentMines = this._countAdjacentMines(r, c);
      }
    }

    this.firstClickDone = true;
  }

  _countAdjacentMines(row, col) {
    let count = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = row + dr, nc = col + dc;
        if (nr >= 0 && nr < this.rows && nc >= 0 && nc < this.cols && this.board[nr][nc].mine) {
          count++;
        }
      }
    }
    return count;
  }

  _adjacentCells(row, col) {
    const cells = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = row + dr, nc = col + dc;
        if (nr >= 0 && nr < this.rows && nc >= 0 && nc < this.cols) {
          cells.push([nr, nc]);
        }
      }
    }
    return cells;
  }

  /* ---- Game actions ---- */
  reveal(row, col) {
    const cell = this.board[row][col];
    if (cell.revealed || cell.flagged) return;
    if (this.state === 'won' || this.state === 'lost') return;

    if (!this.firstClickDone) {
      this._generateMines(row, col);
      this.state = 'playing';
      this._startTimer();
    }

    if (this.state === 'waiting') this.state = 'playing';

    cell.revealed = true;
    cell.questionMark = false;
    this.revealedCount++;

    if (cell.mine) {
      this._gameOver(row, col);
      return;
    }

    this._renderCell(row, col);

    if (cell.adjacentMines === 0) {
      this.sound.reveal0();
      this._floodFill(row, col);
    } else {
      this.sound.click();
    }

    this._checkWin();
  }

  _floodFill(row, col) {
    const queue = [[row, col]];
    const visited = new Set();
    visited.add(row * this.cols + col);

    while (queue.length > 0) {
      const [r, c] = queue.shift();
      for (const [nr, nc] of this._adjacentCells(r, c)) {
        const ncell = this.board[nr][nc];
        if (ncell.revealed || ncell.flagged || ncell.mine) continue;
        const key = nr * this.cols + nc;
        if (visited.has(key)) continue;
        visited.add(key);

        ncell.revealed = true;
        ncell.questionMark = false;
        this.revealedCount++;
        this._renderCell(nr, nc);

        if (ncell.adjacentMines === 0) {
          queue.push([nr, nc]);
        }
      }
    }
  }

  toggleFlag(row, col) {
    const cell = this.board[row][col];
    if (cell.revealed) return;
    if (this.state === 'won' || this.state === 'lost') return;

    // Cycle: none → flag → question mark → none
    if (!cell.flagged && !cell.questionMark) {
      cell.flagged = true;
      this.flagCount++;
      this.sound.flag();
    } else if (cell.flagged) {
      cell.flagged = false;
      cell.questionMark = true;
      this.flagCount--;
      this.sound.flag();
    } else {
      cell.questionMark = false;
      this.sound.flag();
    }

    this._renderCell(row, col);
    this._updateMineCounter();
  }

  chord(row, col) {
    const cell = this.board[row][col];
    if (!cell.revealed || cell.mine || cell.adjacentMines === 0) return;
    if (this.state === 'won' || this.state === 'lost') return;

    let adjFlags = 0;
    const unknown = [];
    for (const [nr, nc] of this._adjacentCells(row, col)) {
      if (this.board[nr][nc].flagged) {
        adjFlags++;
      } else if (!this.board[nr][nc].revealed) {
        unknown.push([nr, nc]);
      }
    }

    // 阶段1：自动标记 —— 当未翻开邻居数恰好等于还需标记的雷数时，自动插旗
    const needFlags = cell.adjacentMines - adjFlags;
    if (needFlags > 0 && unknown.length === needFlags) {
      for (const [nr, nc] of unknown) {
        this.board[nr][nc].flagged = true;
        this.board[nr][nc].questionMark = false;
        this.flagCount++;
        this._renderCell(nr, nc);
      }
      this.sound.flag();
      this._updateMineCounter();
      adjFlags = cell.adjacentMines;
    }

    if (adjFlags !== cell.adjacentMines) return;

    let hitMine = false;
    let mineRow = -1, mineCol = -1;
    for (const [nr, nc] of this._adjacentCells(row, col)) {
      const adj = this.board[nr][nc];
      if (adj.revealed || adj.flagged) continue;
      adj.revealed = true;
      adj.questionMark = false;
      this.revealedCount++;
      this._renderCell(nr, nc);
      if (adj.mine) {
        hitMine = true;
        mineRow = nr;
        mineCol = nc;
      } else if (adj.adjacentMines === 0) {
        this._floodFill(nr, nc);
      }
    }

    if (hitMine) {
      this._gameOver(mineRow, mineCol);
    } else {
      this.sound.click();
      this._checkWin();
    }
  }

  _gameOver(clickedRow, clickedCol) {
    this.state = 'lost';
    this._stopTimer();
    this._setSmiley('lose');
    this.sound.explosion();

    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        const cell = this.board[r][c];
        if (cell.mine && !cell.revealed) {
          cell.revealed = true;
          cell.flagged = false;
          this._renderCell(r, c);
          this.cellEls[r][c].classList.add('mine');
        }
      }
    }
    if (clickedRow >= 0) {
      const clickedCell = this.board[clickedRow][clickedCol];
      if (clickedCell.mine && clickedCell.revealed) {
        this._renderCell(clickedRow, clickedCol);
        this.cellEls[clickedRow][clickedCol].classList.add('mine');
      }
      this.cellEls[clickedRow][clickedCol].classList.add('mine-detonated');
    }
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        const cell = this.board[r][c];
        if (cell.flagged && !cell.mine) {
          this.cellEls[r][c].textContent = '❌';
        }
      }
    }
  }

  _checkWin() {
    const totalCells = this.rows * this.cols;
    if (this.revealedCount === totalCells - this.totalMines) {
      this.state = 'won';
      this._stopTimer();
      this._setSmiley('win');
      this.sound.win();
      this.flagCount = this.totalMines;

      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          const cell = this.board[r][c];
          if (cell.mine && !cell.flagged) {
            cell.flagged = true;
            this._renderCell(r, c);
          }
        }
      }

      this._updateMineCounter();

      const isNew = this.scores.set(this.difficulty, this.timer);
      this._renderHighScores(isNew ? this.difficulty : null);
    }
  }

  /* ---- Timer ---- */
  _startTimer() {
    this.timer = 0;
    this._updateTimer();
    this.timerInterval = setInterval(() => {
      this.timer++;
      if (this.timer > 999) this.timer = 999;
      this._updateTimer();
    }, 1000);
  }

  _stopTimer() {
    if (this.timerInterval) {
      clearInterval(this.timerInterval);
      this.timerInterval = null;
    }
  }

  _updateTimer() {
    this.timerEl.textContent = String(this.timer).padStart(3, '0');
  }

  _updateMineCounter() {
    const remaining = this.totalMines - this.flagCount;
    const sign = remaining < 0 ? '-' : '';
    this.mineCounterEl.textContent = sign + String(Math.abs(remaining)).padStart(sign ? 2 : 3, '0');
  }

  /* ---- Rendering ---- */
  _renderCell(row, col) {
    const cell = this.board[row][col];
    const el = this.cellEls[row][col];
    el.className = 'cell';
    el.textContent = '';

    if (cell.revealed) {
      el.classList.add('revealed');
      if (cell.mine) {
        el.classList.add('mine');
        el.textContent = '💣';
      } else if (cell.adjacentMines > 0) {
        el.classList.add('num-' + cell.adjacentMines);
        el.textContent = cell.adjacentMines;
      }
    } else if (cell.flagged) {
      el.classList.add('flagged');
      el.textContent = '🚩';
    } else if (cell.questionMark) {
      el.classList.add('question-mark');
      el.textContent = '❓';
    }
  }

  _setSmiley(face) {
    let key = 'normal';
    if (face && SMILEY[face]) {
      key = face;
    } else if (this.state === 'won') {
      key = 'win';
    } else if (this.state === 'lost') {
      key = 'lose';
    }
    this.resetBtn.textContent = SMILEY[key];
    this.resetBtn.classList.remove('win', 'lose');
    if (key === 'win') this.resetBtn.classList.add('win');
    if (key === 'lose') this.resetBtn.classList.add('lose');
  }

  /* ---- High scores display ---- */
  _renderHighScores(highlightDiff) {
    const container = document.getElementById('highScores');
    if (!container) return;
    let html = '';
    for (const [key, cfg] of Object.entries(DIFFICULTIES)) {
      const time = this.scores.get(key);
      const safeTime = (typeof time === 'number' && isFinite(time)) ? time : null;
      const isHighlight = highlightDiff === key;
      html +=
        `<div class="hs-entry" style="${isHighlight ? 'background:#fffde0;border-color:#f9a825;' : ''}">` +
        `<div class="hs-label">${cfg.label} ${cfg.rows}x${cfg.cols}</div>` +
        (safeTime != null
          ? `<div class="hs-time">${safeTime}s ${isHighlight ? '\u{1F3C6} \u65B0\u7EAA\u5F55!' : ''}</div>`
          : `<div class="hs-none">\u6682\u65E0\u8BB0\u5F55</div>`) +
        `</div>`;
    }
    container.innerHTML = html;
  }

  /* ---- Event handlers ---- */
  _getCellFromEvent(e) {
    const el = e.target.closest('.cell');
    if (!el) return null;
    const row = parseInt(el.dataset.row, 10);
    const col = parseInt(el.dataset.col, 10);
    if (isNaN(row) || isNaN(col)) return null;
    return { row, col, el };
  }

  _onMouseDown(e) {
    if (e.button !== 0) return;
    const cell = this._getCellFromEvent(e);
    if (!cell) return;
    const boardCell = this.board[cell.row][cell.col];
    if (!boardCell.flagged && !boardCell.questionMark) {
      this._setSmiley('pressed');
    }
  }

  _onMouseUp(_e) {
    if (this.state !== 'lost' && this.state !== 'won') {
      this._setSmiley('normal');
    }
  }

  _onClick(e) {
    const cell = this._getCellFromEvent(e);
    if (!cell) return;
    const boardCell = this.board[cell.row][cell.col];

    if (this.mobileFlagMode) {
      this.toggleFlag(cell.row, cell.col);
      return;
    }

    if (boardCell.flagged || boardCell.questionMark) return;
    if (boardCell.revealed) {
      if (boardCell.adjacentMines > 0) this.chord(cell.row, cell.col);
      return;
    }
    this.reveal(cell.row, cell.col);
  }

  _onDblClick(e) {
    const cell = this._getCellFromEvent(e);
    if (!cell) return;
    this.chord(cell.row, cell.col);
  }

  /* ---- Touch handlers (long-press for flag) ---- */
  _onTouchStart(e) {
    e.preventDefault(); // suppress browser's delayed contextmenu
    const cell = this._getCellFromEvent(e);
    if (!cell) return;
    if (this.mobileFlagMode) return;
    this._longPressCell = cell;
    this._longPressTimer = setTimeout(() => {
      if (this._longPressCell) {
        this.toggleFlag(this._longPressCell.row, this._longPressCell.col);
        this._longPressCell = null;
        if (navigator.vibrate) navigator.vibrate(15);
      }
    }, 500);
  }

  _onTouchEnd(e) {
    if (this._longPressTimer && this._longPressCell) {
      const cell = this._getCellFromEvent(e);
      if (cell && cell.row === this._longPressCell.row && cell.col === this._longPressCell.col) {
        clearTimeout(this._longPressTimer);
        const boardCell = this.board[cell.row][cell.col];
        if (boardCell.revealed && boardCell.adjacentMines > 0) {
          this.chord(cell.row, cell.col);
        } else if (!boardCell.revealed && !boardCell.flagged && !boardCell.questionMark) {
          this.reveal(cell.row, cell.col);
        }
      }
    }
    this._cancelLongPress();
  }

  _cancelLongPress() {
    if (this._longPressTimer) {
      clearTimeout(this._longPressTimer);
      this._longPressTimer = null;
    }
    this._longPressCell = null;
  }

  /* ---- Window resize ---- */
  onResize() {
    const maxBoardWidth = Math.min(window.innerWidth * 0.9, 700);
    let cellSize = Math.floor(maxBoardWidth / this.cols);
    cellSize = Math.max(22, Math.min(40, cellSize));
    this.boardEl.style.setProperty('--cell-size', cellSize + 'px');
  }
}

/* ================================================================
   Bootstrap
   ================================================================ */

const soundMgr = new SoundManager();
const scoreMgr = new HighScoreManager();
const game = new Minesweeper(soundMgr, scoreMgr);

function initAudio() {
  soundMgr.init();
  document.removeEventListener('click', initAudio);
  document.removeEventListener('touchstart', initAudio);
}
document.addEventListener('click', initAudio);
document.addEventListener('touchstart', initAudio);

window.addEventListener('resize', () => game.onResize());

})();
</script>
</body>
</html>
